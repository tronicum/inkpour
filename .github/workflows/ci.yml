name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run Playwright e2e tests"
        type: boolean
        default: false
  schedule:
    - cron: '0 6 * * 1'

jobs:
  validate:
    name: Validate extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            const required = ['manifest_version', 'name', 'version', 'action', 'permissions'];
            required.forEach(k => { if (!m[k]) throw new Error('manifest.json missing field: ' + k); });
            if (m.manifest_version !== 3) throw new Error('Expected manifest_version 3, got ' + m.manifest_version);
            if (!m.content_scripts?.length) throw new Error('No content_scripts defined');
            console.log('✓ manifest.json — ' + m.name + ' v' + m.version + ' (MV3)');
          "

      - name: Check JS syntax
        run: |
          FILES=(
            background.js
            popup.js
            print.js
            settings.js
            src/content.js
            src/extractors/chatgpt.js
            src/extractors/claude.js
            src/extractors/gemini.js
            src/extractors/aistudio.js
            src/extractors/copilot.js
            src/extractors/index.js
            src/exporters/markdown.js
            src/exporters/pdf.js
            src/exporters/json.js
            src/browser/index.js
            src/browser/firefox.js
            src/browser/safari.js
          )
          FAILED=0
          for f in "${FILES[@]}"; do
            if [ -f "$f" ]; then
              if node --check "$f" 2>&1; then
                echo "✓ $f"
              else
                echo "✗ $f"
                FAILED=1
              fi
            else
              echo "⚠ missing: $f"
            fi
          done
          exit $FAILED

      - name: Check required files exist
        run: |
          REQUIRED=(
            manifest.json
            popup.html popup.js
            print.html print.js
            settings.html settings.js
            src/content.js
            icons/icon-48.png
            icons/icon-96.png
            icons/icon-16-active.png
            icons/icon-32-active.png
            icons/icon-48-active.png
            icons/icon-128-active.png
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "✗ missing required file: $f"
              MISSING=1
            else
              echo "✓ $f"
            fi
          done
          exit $MISSING

  test:
    name: Playwright tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[e2e]')
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]
        # firefox: extension test support is limited in Playwright CI;
        # popup-only tests run locally. Add when Playwright Firefox
        # extension support matures.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  notify-failure:
    name: Notify on scheduled test failure
    runs-on: ubuntu-latest
    needs: test
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Open issue on failure
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d '{
              "title": "⚠️ Weekly e2e tests failed",
              "body": "The scheduled weekly Playwright e2e run failed.\n\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "labels": ["bug", "ci"]
            }'
