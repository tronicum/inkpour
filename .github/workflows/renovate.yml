name: Renovate (manual npm check)

# Manual-only trigger: run from the Actions tab whenever you want to check
# for npm dependency updates (jsdom, @playwright/test, etc). Opens/updates
# PRs against branches prefixed "renovate-manual/" when updates are found.
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Renovate log level'
        type: choice
        default: info
        options:
          - info
          - debug

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel }}
