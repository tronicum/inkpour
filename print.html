<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkpour — Print Preview</title>
  <style>
    /* ── Screen styles ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 15px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #f9f9f9;
      padding: 2rem 1rem;
    }

    #page {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      padding: 3rem;
      border-radius: 8px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    /* ── Document header ── */
    .doc-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 2px solid #e5e7eb;
    }
    .doc-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.4rem;
    }
    .meta {
      font-size: 0.85rem;
      color: #6b7280;
      font-style: italic;
    }

    /* ── Messages ── */
    .message {
      margin-bottom: 1.5rem;
      padding: 1.1rem 1.25rem;
      border-radius: 8px;
      border-left: 3px solid transparent;
    }
    .message.user {
      background: #f0f4ff;
      border-left-color: #5b5bd6;
    }
    .message.assistant {
      background: #f0fdf4;
      border-left-color: #16a34a;
    }

    .role-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
    }
    .message.user      .role-label { color: #5b5bd6; }
    .message.assistant .role-label { color: #16a34a; }

    /* ── Content typography ── */
    .content h1, .content h2, .content h3,
    .content h4, .content h5, .content h6 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      margin: 1rem 0 0.4rem;
      line-height: 1.3;
    }
    .content h1 { font-size: 1.4rem; }
    .content h2 { font-size: 1.2rem; }
    .content h3 { font-size: 1.05rem; }

    .content p { margin: 0.6rem 0; }
    .content p:first-child { margin-top: 0; }
    .content p:last-child  { margin-bottom: 0; }

    .content ul, .content ol {
      padding-left: 1.5rem;
      margin: 0.5rem 0;
    }
    .content li { margin: 0.25rem 0; }

    .content strong { font-weight: 700; }
    .content em     { font-style: italic; }
    .content del    { text-decoration: line-through; color: #9ca3af; }

    .content code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 0.85em;
      background: rgba(0,0,0,0.07);
      padding: 0.15em 0.35em;
      border-radius: 4px;
    }

    .content pre {
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 1rem 1.2rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.75rem 0;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    .content pre code {
      background: transparent;
      padding: 0;
      font-size: inherit;
    }

    .content blockquote {
      border-left: 3px solid #d1d5db;
      margin: 0.6rem 0;
      padding: 0.3rem 0.9rem;
      color: #6b7280;
      font-style: italic;
    }

    .content hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1rem 0;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body { color: #e4e4e7; background: #09090b; }
      #page { background: #18181b; box-shadow: 0 2px 20px rgba(0,0,0,0.4); }
      .doc-header { border-bottom-color: #3f3f46; }
      .doc-header h1 { color: #fafafa; }
      .meta { color: #a1a1aa; }
      .message.user { background: #1e1e3a; }
      .message.assistant { background: #14291f; }
      .content code { background: rgba(255,255,255,0.1); }
      .content blockquote { border-left-color: #52525b; color: #a1a1aa; }
      .content hr { border-top-color: #3f3f46; }
    }

    /* ── Print overrides ── */
    @media print {
      body { background: none; padding: 0; }
      #page {
        box-shadow: none;
        border-radius: 0;
        padding: 0;
        max-width: none;
      }
      .message { break-inside: avoid; }
      .content pre { white-space: pre-wrap; word-break: break-all; }
    }
  </style>
</head>
<body>
  <div id="page">
    <p style="color:#888;font-style:italic">Loading conversation…</p>
  </div>

  <script src="print.js"></script>
</body>
</html>
