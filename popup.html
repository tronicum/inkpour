<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkpour</title>
  <style>
    :root {
      --bg:           #ffffff;
      --surface:      #f4f4f5;
      --text:         #18181b;
      --subtext:      #71717a;
      --accent:       #5b5bd6;
      --accent-hover: #4747c2;
      --accent-text:  #ffffff;
      --border:       #e4e4e7;
      --success:      #16a34a;
      --error:        #dc2626;
      --radius:       10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #18181b;
        --surface:      #27272a;
        --text:         #fafafa;
        --subtext:      #a1a1aa;
        --accent:       #818cf8;
        --accent-hover: #a5b4fc;
        --accent-text:  #18181b;
        --border:       #3f3f46;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      padding: 18px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 14px;
      position: relative;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-text);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -1px;
      flex-shrink: 0;
      user-select: none;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }
    .header-text p {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 1px;
    }

    /* ── Settings button ── */
    .settings-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--subtext);
      border-radius: 6px;
      line-height: 0;
      transition: color 0.15s, background 0.15s;
    }
    .settings-btn:hover {
      color: var(--text);
      background: var(--surface);
    }
    .settings-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* ── Supported sites chip list ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 16px;
    }
    .chip {
      font-size: 11px;
      background: var(--surface);
      color: var(--subtext);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 9px;
      transition: opacity 0.2s;
    }
    .chip.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }
    .chip.experimental {
      border-style: dashed;
      opacity: 0.7;
    }
    .chips.detected .chip:not(.active) { opacity: 0.35; }

    /* ── Export section ── */
    .export-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--subtext);
      margin-bottom: 8px;
    }

    .btn-group {
      display: flex;
      gap: 7px;
    }

    .btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--accent-text);
    }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn.default-format { background: var(--accent); color: var(--accent-text); }

    .btn .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading span { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Secondary copy row ── */
    .copy-group {
      margin-top: 6px;
    }
    .copy-btn {
      font-size: 12px;
      padding: 7px 6px;
    }

    /* ── Status message ── */
    #status {
      margin-top: 11px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: var(--subtext);
      line-height: 1.4;
      cursor: default;
    }
    #status:not(:empty) { cursor: pointer; }
    #status:not(:empty):hover { opacity: 0.75; }
    #status.success  { color: var(--success); }
    #status.error    { color: var(--error); }
    #status.warning  { color: #d97706; }

    /* ── Gist link ── */
    #gist-link {
      margin-top: 5px;
      font-size: 11px;
      text-align: center;
    }
    #gist-link a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    #gist-link a:hover { text-decoration: underline; }

    /* ── Last export hint ── */
    #last-export {
      margin-top: 6px;
      font-size: 10.5px;
      text-align: center;
      color: var(--subtext);
      opacity: 0.65;
      letter-spacing: 0.01em;
    }

    /* ── Footer links ── */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .footer-link {
      font-size: 11px;
      color: var(--subtext);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--accent); }

    /* ── Selective export rows ── */
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 11px;
      line-height: 1.35;
    }
    .msg-row:hover { background: var(--border); }
    .msg-row input[type=checkbox] {
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--accent);
    }
    .msg-row .msg-role {
      font-weight: 700;
      flex-shrink: 0;
      width: 44px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .msg-row .msg-role.user  { color: var(--accent); }
    .msg-row .msg-role.ai    { color: var(--success); }
    .msg-row .msg-preview {
      color: var(--subtext);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">ip</div>
    <div class="header-text">
      <h1>Inkpour</h1>
      <p>Export AI chats · MD, PDF, HTML, JSON, ZIP</p>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <hr />

  <div class="chips">
    <span class="chip">ChatGPT</span>
    <span class="chip">Claude</span>
    <span class="chip">Gemini</span>
    <span class="chip">AI Studio</span>
    <span class="chip">Copilot</span>
    <span class="chip">Grok</span>
    <span class="chip experimental" title="Experimental support">Perplexity</span>
    <span class="chip experimental" title="Experimental support">DeepSeek</span>
    <span class="chip experimental" title="Experimental support">Meta AI</span>
    <span class="chip experimental" title="Experimental support">Mistral</span>
    <span class="chip experimental" title="Experimental support">HuggingChat</span>
    <span class="chip experimental" title="Experimental support">Poe</span>
    <span class="chip experimental" title="Experimental support">Phind</span>
    <span class="chip experimental" title="Experimental support">NotebookLM</span>
    <span class="chip experimental" title="Experimental support">Kagi</span>
  </div>

  <p class="export-label">Export as</p>
  <div class="btn-group">
    <button class="btn" id="mdBtn" title="Export to Markdown (Alt+Shift+M)">
      <div class="spinner"></div>
      <span>MD</span>
    </button>
    <button class="btn" id="pdfBtn" title="Export to PDF">
      <div class="spinner"></div>
      <span>PDF</span>
    </button>
    <button class="btn" id="htmlBtn" title="Export to HTML">
      <div class="spinner"></div>
      <span>HTML</span>
    </button>
    <button class="btn" id="jsonBtn" title="Export to JSON (Alt+Shift+J)">
      <div class="spinner"></div>
      <span>JSON</span>
    </button>
  </div>
  <div class="btn-group copy-group">
    <button class="btn copy-btn" id="copyBtn" title="Copy Markdown to clipboard (Alt+Shift+C)">
      <div class="spinner"></div>
      <span>Copy MD</span>
    </button>
    <button class="btn copy-btn" id="copyHtmlBtn" title="Copy standalone HTML to clipboard (Alt+Shift+H)">
      <div class="spinner"></div>
      <span>Copy HTML</span>
    </button>
    <button class="btn copy-btn" id="zipBtn" title="Export ZIP with chat.md + extracted code files (Alt+Shift+Z)">
      <div class="spinner"></div>
      <span>ZIP</span>
    </button>
    <button class="btn copy-btn" id="gistBtn" title="Upload Markdown to GitHub Gist" hidden>
      <div class="spinner"></div>
      <span>Gist ↑</span>
    </button>
  </div>

  <div id="status"></div>
  <div id="new-msgs-hint" hidden style="display:none;margin-top:4px;font-size:10.5px;
       text-align:center;color:#d97706;"></div>
  <input id="titleInput" type="text" placeholder="Chat title…" hidden
    style="display:none;width:100%;margin-top:7px;padding:5px 9px;font-size:12px;
           border:1.5px solid var(--accent);border-radius:7px;background:var(--bg);
           color:var(--text);outline:none;box-sizing:border-box;" />
  <div id="notes-section" hidden style="display:none;margin-top:6px;">
    <textarea id="notesInput" rows="3" placeholder="Add personal notes — prepended as a blockquote in the export…"
      style="width:100%;font-size:11px;padding:6px 9px;border:1px solid var(--border);
             border-radius:7px;background:var(--bg);color:var(--text);outline:none;
             resize:vertical;box-sizing:border-box;font-family:inherit;line-height:1.45;"></textarea>
  </div>
  <button id="notesToggle" hidden
    style="display:none;width:100%;margin-top:5px;font-size:11px;color:var(--subtext);
           background:none;border:none;cursor:pointer;text-align:left;padding:2px 0;">
    + Add notes
  </button>

  <!-- Selective export -->
  <button id="selectToggle" hidden
    style="display:none;width:100%;margin-top:5px;font-size:11px;color:var(--subtext);
           background:none;border:none;cursor:pointer;text-align:left;padding:2px 0;">
    ☑ Select messages
  </button>
  <div id="select-section" hidden style="display:none;margin-top:6px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-size:10.5px;color:var(--subtext);" id="selectCount"></span>
      <span style="font-size:10.5px;">
        <button id="selectAll" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;">All</button>
        <button id="selectNone" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;">None</button>
        <button id="selectUser" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;">User only</button>
        <button id="selectAI" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;">AI only</button>
      </span>
    </div>
    <div id="msgCheckboxes" style="max-height:140px;overflow-y:auto;border:1px solid var(--border);
         border-radius:7px;padding:4px 0;background:var(--surface);"></div>
  </div>

  <div id="gist-link"></div>
  <div id="last-export"></div>

  <div class="footer-links">
    <button class="footer-link" id="historyBtn">⏱ History</button>
    <button class="footer-link" id="settingsBtn2">⚙ Settings</button>
  </div>

  <script src="src/utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
