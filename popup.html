<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inkpour</title>
  <style>
    :root {
      --bg:           #ffffff;
      --surface:      #f4f4f5;
      --text:         #18181b;
      --subtext:      #71717a;
      --accent:       #5b5bd6;
      --accent-hover: #4747c2;
      --accent-text:  #ffffff;
      --border:       #e4e4e7;
      --success:      #16a34a;
      --error:        #dc2626;
      --radius:       10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #18181b;
        --surface:      #27272a;
        --text:         #fafafa;
        --subtext:      #a1a1aa;
        --accent:       #818cf8;
        --accent-hover: #a5b4fc;
        --accent-text:  #18181b;
        --border:       #3f3f46;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      padding: 18px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 14px;
      position: relative;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-text);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -1px;
      flex-shrink: 0;
      user-select: none;
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }
    .header-text p {
      font-size: 11px;
      color: var(--subtext);
      margin-top: 1px;
    }

    /* ── Settings button ── */
    .settings-btn {
      position: absolute;
      top: 0;
      inset-inline-end: 0;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--subtext);
      border-radius: 6px;
      line-height: 0;
      transition: color 0.15s, background 0.15s;
    }
    .settings-btn:hover {
      color: var(--text);
      background: var(--surface);
    }
    .settings-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ── Import button (sits just before the settings gear) ── */
    .import-btn {
      inset-inline-end: 30px;
    }

    /* ── Import panel ── */
    #import-section {
      margin-bottom: 12px;
      padding: 10px;
      border: 1.5px solid var(--accent);
      border-radius: var(--radius);
      background: var(--surface);
    }
    #import-section textarea,
    #import-section input {
      width: 100%;
      font-size: 12px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      box-sizing: border-box;
      font-family: inherit;
    }
    #import-section textarea {
      resize: vertical;
      line-height: 1.45;
    }
    #import-section input {
      margin-top: 6px;
    }
    #importError {
      margin-top: 5px;
      font-size: 11px;
      color: var(--error);
      min-height: 14px;
    }
    .import-actions {
      display: flex;
      gap: 7px;
      margin-top: 6px;
    }
    .import-actions .btn {
      padding: 7px 6px;
      font-size: 12px;
    }

    /* ── Divider ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 14px;
    }

    /* ── Platform indicator (replaces chip list) ── */
    .platform-indicator {
      font-size: 12px;
      margin-bottom: 14px;
      min-height: 18px;
      color: var(--subtext);
    }
    .platform-indicator.detected {
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Export section ── */
    /* ── Export picker (selector + separate "Export" button) ──
       Picking a format in the menu only changes the selection; nothing
       runs until the Export button is pressed. An earlier version fired
       the real action the instant a menu row was clicked, which for a
       Gist/Notion upload in particular meant "it happens before you can
       change your mind" — see TODOs.md's popup-layout item. */
    .export-picker {
      display: flex;
      gap: 7px;
      margin-top: 2px;
    }
    .export-select-btn {
      flex: 1;
      min-width: 0;
      padding: 9px 10px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
      white-space: nowrap;
      transition: border-color 0.15s;
    }
    .export-select-btn span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .export-select-btn:hover { border-color: var(--accent); }
    .export-select-btn[aria-expanded="true"] { border-color: var(--accent); }
    .export-select-caret {
      font-size: 10px;
      color: var(--subtext);
      flex-shrink: 0;
    }
    .export-go-btn {
      flex-shrink: 0;
      min-width: 84px;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--accent);
      color: var(--accent-text);
      border: 1.5px solid var(--accent);
      transition: background 0.15s, opacity 0.15s;
    }
    .export-go-btn:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
    .export-go-btn:disabled { opacity: 0.5; cursor: default; }
    .export-go-btn .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .export-go-btn.loading .spinner { display: block; }
    .export-go-btn.loading span { display: none; }

    .btn-group {
      display: flex;
      gap: 7px;
    }

    .btn {
      flex: 1;
      padding: 9px 6px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      background: var(--accent);
      color: var(--accent-text);
    }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn.default-format { background: var(--accent); color: var(--accent-text); }

    .btn .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading span { display: none; }

    /* ── Export menu (opened by the picker's selector button) ── */
    /* These rows are a pure picker — clicking one only changes the
       selection (popup.js's setSelectedFormat()). The real export/copy/
       upload logic lives, unmodified, in the hidden buttons further down
       popup.html and only ever runs when the Export button is clicked. */
    .export-menu {
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 4px;
    }
    .export-menu-item {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text);
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      text-align: start;
    }
    .export-menu-item:hover { background: var(--bg); }
    .export-menu-item.selected {
      background: var(--accent);
      color: var(--accent-text);
    }
    .export-menu-check {
      width: 12px;
      flex-shrink: 0;
      visibility: hidden;
    }
    .export-menu-item.selected .export-menu-check { visibility: visible; }
    .export-menu-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Secondary copy row ── */
    .copy-group {
      margin-top: 6px;
    }
    .copy-btn {
      font-size: 12px;
      padding: 7px 6px;
    }

    /* ── Status message ── */
    #status {
      margin-top: 11px;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: var(--subtext);
      line-height: 1.4;
      cursor: default;
    }
    #status:not(:empty) { cursor: pointer; }
    #status:not(:empty):hover { opacity: 0.75; }
    #status.success  { color: var(--success); }
    #status.error    { color: var(--error); }
    #status.warning  { color: #d97706; }

    /* ── Gist link ── */
    #gist-link {
      margin-top: 5px;
      font-size: 11px;
      text-align: center;
    }
    #gist-link a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    #gist-link a:hover { text-decoration: underline; }
    .gist-link-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .gist-link-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 10.5px;
      font-weight: 600;
      cursor: pointer;
      padding: 1px 3px;
    }
    .gist-link-btn:hover { text-decoration: underline; }

    /* ── Last export hint ── */
    #last-export {
      margin-top: 6px;
      font-size: 10.5px;
      text-align: center;
      color: var(--subtext);
      opacity: 0.65;
      letter-spacing: 0.01em;
    }

    /* ── Footer links ── */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .footer-link {
      font-size: 11px;
      color: var(--subtext);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--accent); }

    /* ── Selective export rows ── */
    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 11px;
      line-height: 1.35;
    }
    .msg-row:hover { background: var(--border); }
    .msg-row input[type=checkbox] {
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--accent);
    }
    .msg-row .msg-role {
      font-weight: 700;
      flex-shrink: 0;
      width: 44px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .msg-row .msg-role.user  { color: var(--accent); }
    .msg-row .msg-role.ai    { color: var(--success); }
    .msg-row .msg-preview {
      color: var(--subtext);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">ip</div>
    <div class="header-text">
      <h1>Inkpour</h1>
      <p data-i18n="popupTagline">Export AI chats · MD, PDF, HTML, JSON, ZIP</p>
    </div>
    <button class="settings-btn import-btn" id="importBtn" data-i18n-title="popupImportBtnTitle" data-i18n-aria-label="popupImportBtnTitle" title="Import from clipboard" aria-label="Import from clipboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v11"/>
        <path d="M7 10l5 5 5-5"/>
        <path d="M4 20h16"/>
      </svg>
    </button>
    <button class="settings-btn" id="settingsBtn" data-i18n-title="popupSettingsTitle" data-i18n-aria-label="popupSettingsTitle" title="Settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <hr />

  <div id="import-section" hidden style="display:none;">
    <textarea id="importText" rows="5" data-i18n-placeholder="popupImportTextPlaceholder" placeholder="Paste a copied conversation here…"></textarea>
    <input id="importTitleInput" type="text" data-i18n-placeholder="popupImportTitlePlaceholder" placeholder="Title (optional)…" />
    <div id="importError"></div>
    <div class="import-actions">
      <button class="btn" id="importCancelBtn" style="border-color:var(--border);color:var(--subtext);" data-i18n="popupImportCancelBtn">Cancel</button>
      <button class="btn" id="importSubmitBtn" style="background:var(--accent);color:var(--accent-text);" data-i18n="popupImportSubmitBtn">Import</button>
    </div>
  </div>

  <p class="platform-indicator" id="platformIndicator"></p>

  <!-- Quick actions: the two most-used single-click exports, always
       visible (feedback: burying Copy MD/ZIP behind a dropdown made them
       harder to reach, even though they're what people reach for most).
       Ordinary one-click buttons — same instant-fire behavior as before
       the redesign, unchanged handlers. -->
  <div class="btn-group copy-group" id="quick-actions">
    <button class="btn copy-btn" id="copyBtn" data-i18n-title="popupCopyBtnTitle" title="Copy Markdown to clipboard (Alt+Shift+C)">
      <div class="spinner"></div>
      <span data-i18n="popupBtnCopyMd">Copy MD</span>
    </button>
    <button class="btn copy-btn" id="zipBtn" data-i18n-title="popupZipBtnTitle" title="Export ZIP with chat.md + extracted code files (Alt+Shift+Z)">
      <div class="spinner"></div>
      <span data-i18n="popupBtnZip">ZIP</span>
    </button>
  </div>

  <!-- Format picker + Export (replaces the old instant-fire split button,
       TODOs.md "Popup layout" item). Picking a row in the menu below only
       changes the selection — nothing runs until "Export" is pressed. Menu
       rows are plain UI (data-format only, no real click handlers); the
       actual export/copy/upload logic lives, completely unchanged, in the
       hidden buttons further down, which the Export button proxies to via
       .click(). See popup.js's FORMAT_TO_BTN / selectedFormat. -->
  <div class="export-picker">
    <button class="export-select-btn" id="exportSelectBtn" type="button"
      aria-haspopup="true" aria-expanded="false"
      data-i18n-title="popupExportMoreOptions" title="Choose a format">
      <span id="exportSelectedLabel">MD</span>
      <span class="export-select-caret">▾</span>
    </button>
    <button class="export-go-btn" id="exportGoBtn" type="button">
      <div class="spinner"></div>
      <span data-i18n="popupExportGoBtn">Export</span>
    </button>
  </div>
  <div class="export-menu" id="exportMenu" hidden style="display:none;" role="menu">
    <button class="export-menu-item" type="button" data-format="md" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnMd">MD</span>
    </button>
    <button class="export-menu-item" type="button" data-format="pdf" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnPdf">PDF</span>
    </button>
    <button class="export-menu-item" type="button" data-format="html" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnHtml">HTML</span>
    </button>
    <button class="export-menu-item" type="button" data-format="json" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnJson">JSON</span>
    </button>
    <button class="export-menu-item" type="button" data-format="docx" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnDocx">DOCX</span>
    </button>
    <div class="export-menu-sep"></div>
    <button class="export-menu-item" type="button" data-format="copy-html" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnCopyHtml">Copy HTML</span>
    </button>
    <button class="export-menu-item" type="button" data-format="all" role="menuitemradio">
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnExportAll">⬇ Export All (MD + DOCX + ZIP)</span>
    </button>
    <div class="export-menu-sep"></div>
    <button class="export-menu-item" type="button" data-format="gist" id="gistMenuOption" role="menuitemradio" hidden>
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnGist">Gist ↑</span>
    </button>
    <button class="export-menu-item" type="button" data-format="notion" id="notionMenuOption" role="menuitemradio" hidden>
      <span class="export-menu-check">✓</span><span data-i18n="popupBtnNotion">Notion ↑</span>
    </button>
  </div>

  <!-- Real export/copy/upload actions: same ids, same unmodified handlers
       popup.js has always had — just never shown or directly clickable
       any more. The Export button above fires whichever one matches the
       current selection via .click(). (Copy MD/ZIP stayed real, visible,
       directly-clickable buttons in the quick-actions row instead — the
       safety concern was specifically an accidental instant-fire from
       inside a dropdown, in particular for Gist/Notion uploads.) -->
  <div id="realExportActions" hidden style="display:none;">
    <button id="mdBtn" data-i18n-title="popupMdBtnTitle" title="Export to Markdown (Alt+Shift+M)"><div class="spinner"></div><span data-i18n="popupBtnMd">MD</span></button>
    <button id="pdfBtn" data-i18n-title="popupPdfBtnTitle" title="Export to PDF"><div class="spinner"></div><span data-i18n="popupBtnPdf">PDF</span></button>
    <button id="htmlBtn" data-i18n-title="popupHtmlBtnTitle" title="Export to HTML"><div class="spinner"></div><span data-i18n="popupBtnHtml">HTML</span></button>
    <button id="jsonBtn" data-i18n-title="popupJsonBtnTitle" title="Export to JSON (Alt+Shift+J)"><div class="spinner"></div><span data-i18n="popupBtnJson">JSON</span></button>
    <button id="docxBtn" data-i18n-title="popupDocxBtnTitle" title="Export to Word document (.docx)"><div class="spinner"></div><span data-i18n="popupBtnDocx">DOCX</span></button>
    <button id="copyHtmlBtn" data-i18n-title="popupCopyHtmlBtnTitle" title="Copy standalone HTML to clipboard (Alt+Shift+H)"><div class="spinner"></div><span data-i18n="popupBtnCopyHtml">Copy HTML</span></button>
    <button id="allBtn" data-i18n-title="popupAllBtnTitle" title="Export MD + DOCX + ZIP simultaneously"><div class="spinner"></div><span data-i18n="popupBtnExportAll">⬇ Export All (MD + DOCX + ZIP)</span></button>
    <button id="gistBtn" data-i18n-title="popupGistBtnTitle" title="Upload Markdown to GitHub Gist" hidden><div class="spinner"></div><span data-i18n="popupBtnGist">Gist ↑</span></button>
    <button id="notionBtn" data-i18n-title="popupNotionBtnTitle" title="Append Markdown to a Notion page" hidden><div class="spinner"></div><span data-i18n="popupBtnNotion">Notion ↑</span></button>
  </div>

  <!-- Debug mode (Settings → Advanced → Debug mode) — never includes chat content -->
  <div class="btn-group copy-group" id="debug-group" hidden style="display:none;">
    <button class="btn copy-btn" id="debugDomBtn" data-i18n-title="popupDebugDomBtnTitle" title="Copy debug info (no chat content included)">
      <div class="spinner"></div>
      <span data-i18n="popupBtnDebugDom">Copy debug info</span>
    </button>
    <button class="btn copy-btn" id="reportBugBtn" data-i18n-title="popupReportBugBtnTitle" title="Report a bug on GitHub (no chat content included)">
      <div class="spinner"></div>
      <span data-i18n="popupBtnReportBug">Report bug</span>
    </button>
  </div>

  <div id="status"></div>
  <div id="new-msgs-hint" hidden style="display:none;margin-top:4px;font-size:10.5px;
       text-align:center;color:#d97706;"></div>
  <div id="incrementalHint" hidden style="display:none;margin-top:6px;padding:7px 9px;
       border:1px solid var(--accent);border-radius:7px;background:var(--surface);
       text-align:center;">
    <span data-role="text" style="font-size:10.5px;color:var(--subtext);"></span>
    <button class="btn" id="incrementalExportBtn" data-i18n-title="popupIncrementalBtnTitle" title="Export only the messages added since your last export"
      style="margin-top:4px;width:100%;padding:6px 6px;font-size:11.5px;
             font-weight:600;color:var(--accent-text);background:var(--accent);
             border:none;border-radius:7px;cursor:pointer;">
      <div class="spinner"></div>
      <span data-i18n="popupBtnExportNewOnly">Export new only</span>
    </button>
  </div>
  <input id="titleInput" type="text" data-i18n-placeholder="popupTitleInputPlaceholder" placeholder="Chat title…" hidden
    style="display:none;width:100%;margin-top:7px;padding:5px 9px;font-size:12px;
           border:1.5px solid var(--accent);border-radius:7px;background:var(--bg);
           color:var(--text);outline:none;box-sizing:border-box;" />
  <div id="notes-section" hidden style="display:none;margin-top:6px;">
    <textarea id="notesInput" rows="3" data-i18n-placeholder="popupNotesPlaceholder" placeholder="Add personal notes — prepended as a blockquote in the export…"
      style="width:100%;font-size:11px;padding:6px 9px;border:1px solid var(--border);
             border-radius:7px;background:var(--bg);color:var(--text);outline:none;
             resize:vertical;box-sizing:border-box;font-family:inherit;line-height:1.45;"></textarea>
  </div>
  <button id="notesToggle" hidden
    style="display:none;width:100%;margin-top:5px;font-size:11px;color:var(--subtext);
           background:none;border:none;cursor:pointer;text-align:start;padding:2px 0;">
    + Add notes
  </button>

  <!-- Selective export -->
  <button id="selectToggle" hidden
    style="display:none;width:100%;margin-top:5px;font-size:11px;color:var(--subtext);
           background:none;border:none;cursor:pointer;text-align:start;padding:2px 0;">
    ☑ Select messages
  </button>
  <div id="select-section" hidden style="display:none;margin-top:6px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-size:10.5px;color:var(--subtext);" id="selectCount"></span>
      <span style="font-size:10.5px;">
        <button id="selectAll" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;" data-i18n="popupSelectAll">All</button>
        <button id="selectNone" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;" data-i18n="popupSelectNone">None</button>
        <button id="selectUser" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;" data-i18n="popupSelectUserOnly">User only</button>
        <button id="selectAI" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;" data-i18n="popupSelectAIOnly">AI only</button>
      </span>
    </div>
    <div id="msgCheckboxes" style="max-height:140px;overflow-y:auto;border:1px solid var(--border);
         border-radius:7px;padding:4px 0;background:var(--surface);"></div>
  </div>

  <!-- Batch export (Batch 8): pick multiple PAST conversations from this
       platform's own history sidebar and get one ZIP. Only revealed when
       getConversationList() (src/content.js) finds a history sidebar on the
       current page — logged-out pages and unsupported platforms never see
       this at all, so it can't regress the single-conversation export path
       above. Runs as a sequential background-tab automation in
       background.js; stays running even if this popup closes. -->
  <button id="batchExportToggle" hidden
    style="display:none;width:100%;margin-top:5px;font-size:11px;color:var(--subtext);
           background:none;border:none;cursor:pointer;text-align:start;padding:2px 0;">
    <span data-i18n="popupBatchExportToggle">📦 Batch export past conversations…</span>
  </button>
  <div id="batch-export-section" hidden style="display:none;margin-top:6px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <span style="font-size:10.5px;color:var(--subtext);" id="batchExportCount"></span>
      <span style="font-size:10.5px;">
        <button id="batchExportSelectAll" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;" data-i18n="popupSelectAll">All</button>
        <button id="batchExportSelectNone" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:10.5px;padding:0 3px;" data-i18n="popupSelectNone">None</button>
      </span>
    </div>
    <div id="batchExportCheckboxes" style="max-height:140px;overflow-y:auto;border:1px solid var(--border);
         border-radius:7px;padding:4px 0;background:var(--surface);"></div>
    <button class="btn" id="batchExportStartBtn" data-i18n-title="popupBatchExportStartBtnTitle" title="Export the ticked conversations as one ZIP"
      style="margin-top:6px;width:100%;padding:6px 6px;font-size:11.5px;
             font-weight:600;color:var(--accent-text);background:var(--accent);
             border:none;border-radius:7px;cursor:pointer;">
      <div class="spinner"></div>
      <span data-i18n="popupBatchExportStartBtn">Export selected as ZIP</span>
    </button>
    <div id="batchExportStatus" style="margin-top:4px;font-size:10.5px;color:var(--subtext);text-align:center;"></div>
  </div>

  <div id="gist-link"></div>
  <div id="last-export"></div>

  <div class="footer-links">
    <button class="footer-link" id="historyBtn" data-i18n="popupHistoryBtn">⏱ History</button>
    <button class="footer-link" id="settingsBtn2" data-i18n="popupSettingsBtn">⚙ Settings</button>
  </div>

  <script src="src/i18n.js"></script>
  <script src="src/utils.js"></script>
  <script src="src/diff.js"></script>
  <script src="src/redact.js"></script>
  <script src="src/vaultHandle.js"></script>
  <script src="popup.js"></script>
</body>
</html>
